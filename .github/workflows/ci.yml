name: CI

# Quality and security gates. Runs WITHOUT AWS credentials: it never touches the
# lab. Deployment (terraform apply / ansible) is done from the laptop.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # --- P0: quality ---------------------------------------------------------
  lint:
    name: Lint (Terraform, Dockerfiles, Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform validate
        run: |
          terraform -chdir=terraform init -backend=false
          terraform -chdir=terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        run: tflint --chdir=terraform --recursive

      - name: Hadolint (backend Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: error

      - name: Hadolint (frontend Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff + Black
        run: |
          pip install ruff black
          ruff check backend/
          black --check backend/

  # --- P0: secret scanning -------------------------------------------------
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source /repo --redact -v

  # --- P0: container build + image vulnerability scan ----------------------
  build-scan:
    name: Build images + Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t pomodoro/backend:ci ./backend

      - name: Build frontend image
        run: docker build -t pomodoro/frontend:ci ./frontend

      - name: Trivy scan (backend image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pomodoro/backend:ci
          format: table
          output: trivy-backend.txt
          severity: HIGH,CRITICAL
          exit-code: "0" # report only; base-image CVEs should not block

      - name: Trivy scan (frontend image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pomodoro/frontend:ci
          format: table
          output: trivy-frontend.txt
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Upload image scan reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: trivy-*.txt

  # --- P1: IaC scanning ----------------------------------------------------
  iac-scan:
    name: IaC scan (Trivy + Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform
          format: table
          output: trivy-iac.txt
          exit-code: "0"

      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          soft_fail: true
          output_format: cli
          output_file_path: checkov.txt

      - name: Upload IaC scan reports
        uses: actions/upload-artifact@v4
        with:
          name: iac-scan-reports
          path: |
            trivy-iac.txt
            checkov.txt

  # --- P2: dependency + SAST (bonus, non-blocking) -------------------------
  deps-sast:
    name: Dependencies + SAST (bonus)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit (backend dependencies)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt || true

      - name: Semgrep (SAST)
        run: |
          pip install semgrep
          semgrep --config auto --error backend/ || true
