---
# Deploy the frontend: template Nginx to point at the backend, run the container.

- name: Create app directory
  ansible.builtin.file:
    path: /opt/pomodoro
    state: directory
    mode: "0750"

# Override the image's baked nginx.conf so /api points at the backend private IP.
- name: Render nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /opt/pomodoro/nginx.conf
    mode: "0644"

- name: Remove any previous frontend container
  ansible.builtin.command: docker rm -f {{ frontend_container }}
  changed_when: false
  failed_when: false

- name: Pull the frontend image
  ansible.builtin.command: docker pull {{ ecr_frontend }}:{{ image_tag }}
  changed_when: true

- name: Run the frontend container
  ansible.builtin.command: >
    docker run -d
    --name {{ frontend_container }}
    --restart unless-stopped
    -p 80:80
    -v /opt/pomodoro/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    {{ ecr_frontend }}:{{ image_tag }}
  changed_when: true
